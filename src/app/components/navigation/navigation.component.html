<nav class="bottom-nav">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
    <span class="icon">🏠</span>
    <span class="label">Inicio</span>
  </a>

  <a routerLink="/juegos" routerLinkActive="active" class="nav-item">
    <span class="icon">📚</span>
    <span class="label">Ludoteca</span>
  </a>
  
  <a *ngIf="auth.isAdmin()" routerLink="/admin" routerLinkActive="active" class="nav-item">
    <span class="icon">⚙️</span>
    <span class="label">Admin</span>
  </a>

  <div class="nav-spacer" *ngIf="!auth.isAdmin()"></div>

  <a *ngIf="auth.currentUser$ | async as user" class="nav-item profile">
    <span class="icon">👤</span>
    <span class="label">{{user.name.split(' ')[0]}}</span>
  </a>

  <a *ngIf="!(auth.currentUser$ | async)" routerLink="/login" routerLinkActive="active" class="nav-item">
    <span class="icon">🔑</span>
    <span class="label">Entrar</span>
  </a>
</nav>
